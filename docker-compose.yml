services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: careeros
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      - mongo
    volumes:
      # Mount the trained JobShield models (read-only) so the Scam Shield engine can load them
      - ../JobShieldAI/saved_models:/models:ro

  # Frontend (Next.js) — build in Phase 2
  # frontend:
  #   build: { context: ./frontend }
  #   ports: ["3000:3000"]
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8000/api

volumes:
  mongo_data:
